{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>실시간 채팅(임베드)</title>
<style>
  body { margin:0; font-family: Pretendard, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#fff; }
  .embed-wrap { display:flex; flex-direction:column; height:100vh; }
  .embed-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid #eee; }
  .embed-title { font-weight:700; color:#2d3436; font-size:14px; }
  .embed-actions { display:flex; gap:8px; }
  .embed-actions a, .embed-actions button { appearance:none; border:1px solid #eee; background:#fafafa; padding:6px 10px; border-radius:8px; font-size:12px; color:#444; cursor:pointer; text-decoration:none; }
  .embed-actions a:hover, .embed-actions button:hover { background:#f3f3f3; }
  .messages { flex:1; overflow:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background:#fff; }
  .msg { max-width:78%; padding:10px 12px; border-radius:14px; font-size:14px; line-height:1.5; box-shadow: 0 1px 4px rgba(0,0,0,0.06); word-break: break-word; }
  .msg-own { align-self:flex-end; background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 100%); color:#fff; border-bottom-right-radius:6px; }
  .msg-other { align-self:flex-start; background:#fff; color:#333; border:1px solid #eee; border-bottom-left-radius:6px; }
  .msg-user { font-size:12px; color:#666; margin-bottom:4px; }
  .msg-time { font-size:11px; color:#999; margin-top:4px; text-align:right; }
  .input-bar { display:flex; align-items:center; gap:8px; border-top:1px solid #eee; padding:8px; background:#fff; }
  .input-bar input { flex:1; border:1px solid #e5e7eb; border-radius:18px; padding:10px 12px; outline:none; font-size:14px; }
  .input-bar button { appearance:none; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer; background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 100%); color:#fff; }
  @media (max-width: 420px) { .embed-actions a, .embed-actions button { padding:6px 8px; font-size:11px; } }
</style>
</head>
<body>
<div class="embed-wrap">
  <div class="embed-header">
      <div class="embed-title">{{ room.title }}</div>
      <div class="embed-actions">
          <a href="/chat/embedded/?mode=lobby" title="목록">목록</a>
          <a href="/chat/room/{{ room.id }}/" target="_top" title="전체화면">전체화면 보기</a>
      </div>
  </div>
  <div id="messagesContainer" class="messages">
    {% for m in messages %}
      <div class="msg {% if m.user_id == request.user.id %}msg-own{% else %}msg-other{% endif %}">
        {% if m.user_id != request.user.id %}
          <div class="msg-user">{{ m.user.userprofile.nickname|default:m.user.username }}</div>
        {% endif %}
        <div>{{ m.content }}</div>
        <div class="msg-time">{{ m.created_at|date:"H:i:s" }}</div>
      </div>
    {% endfor %}
  </div>
  <form id="messageForm" class="input-bar">
      <input id="messageInput" type="text" placeholder="메시지를 입력하세요" autocomplete="off" />
      <button id="sendBtn" type="submit">➤</button>
  </form>
</div>

<script>
(function(){
  let lastMessageId = {{ last_message_id|default:0 }};
  const form = document.getElementById('messageForm');
  const input = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const container = document.getElementById('messagesContainer');

  function getCookie(name){
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  function appendMessage(msg){
    const el = document.createElement('div');
    el.className = 'msg ' + (msg.is_own ? 'msg-own' : 'msg-other');
    el.innerHTML = (msg.is_own ? '' : `<div class="msg-user">${msg.user_nickname||msg.user}</div>`) +
                   `<div>${msg.content}</div>` +
                   `<div class="msg-time">${msg.created_at}</div>`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const content = input.value.trim();
    if(!content) return;
    sendBtn.disabled = true;

    const formData = new FormData();
    formData.append('content', content);
    formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));

    fetch(`/chat/room/{{ room.id }}/send/`, { method:'POST', body: formData })
      .then(r => r.json())
      .then(data => {
        if(data.success){
          input.value='';
        } else {
          alert(data.error || '전송 실패');
        }
      })
      .catch(() => alert('전송 중 오류'))
      .finally(() => { sendBtn.disabled = false; input.focus(); });
  });

  function fetchNew(){
    fetch(`/chat/room/{{ room.id }}/fetch/?last_message_id=${lastMessageId}`)
      .then(r => r.json())
      .then(data => {
        if(Array.isArray(data.messages)){
          data.messages.forEach(msg => { appendMessage(msg); lastMessageId = msg.id; });
        }
      })
      .catch(()=>{});
  }

  // 초기 스크롤과 폴링 시작
  container.scrollTop = container.scrollHeight;
  setInterval(fetchNew, 2000);
})();

// 현재 방 ID를 부모 창에 전달하여 팝업 헤더의 전체화면 버튼이 동작하도록 함
try {
  window.parent && window.parent.postMessage({ type: 'chat:room', roomId: {{ room.id }} }, '*');
} catch(_) {}
</script>
</body>
</html>
