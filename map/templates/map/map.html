{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/map.css' %}">
<div style="max-width: 1200px; margin: 50px auto; padding: 20px;">
    <h2 style="text-align: center; margin-bottom: 30px; font-weight: 800;">
        <a href="{% url 'map:map' %}" style="text-decoration: none; color: #333;">
            우리 동네 지도 서비스
        </a>
    </h2>
    
    <div id="current_addr" class="current-location-box">
         위치를 찾는 중입니다...
    </div>

    <div class="map_wrap">
        <div id="map"></div>

        <div class="search_panel">
            <h4 style="margin: 0 0 10px 0;">지역 선택</h4>
            
            <select id="gu_select">
                <option value="">1. 구 선택 (서울)</option>
            </select>

            <select id="dong_select" disabled>
                <option value="">2. 동 선택</option>
            </select>

            <hr style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">

            <input type="text" id="keyword" placeholder="장소 검색 (예: 스타벅스)">
            <button id="search_btn">검색하기</button>

            <div class="category_group">
                <button id="btn_hospital">🏥 병원</button>
                <button id="btn_pharmacy">💊 약국</button>
                <button id="btn_kidscafe">🎪 키즈</button>
                <button id="btn_convenience">🏪 편의점</button>
            </div>
            
            <button id="my_location_btn" style="margin-top: 10px; background: #ff6b6b; border:none;">내 위치로 (초기화)</button>
        </div>
    </div>
</div>

        var option = document.createElement('option');
        option.value = gu;
        option.text = gu;
        guSelect.appendChild(option);
    });
    
    // 구 선택 이벤트 직접 바인딩
    guSelect.addEventListener('change', function() {
        updateDongList();
    });
    
    // 동 선택 이벤트 직접 바인딩

        changeDong();

    // 검색 관련 이벤트 바인딩

    });

    document.getElementById('my_location_btn').addEventListener('click', function() {
        findMyLocation();
    });

    var mapContainer = document.getElementById('map');
    var mapOption = { center: new kakao.maps.LatLng(37.566826, 126.9786567), level: 4 };
    var map = new kakao.maps.Map(mapContainer, mapOption);
    
    var ps = new kakao.maps.services.Places(); 
    var geocoder = new kakao.maps.services.Geocoder();
    var markers = [];
    var myLocationMarker = null; 
    var myCurrentLat = null; 
    var myCurrentLng = null;
    var overlay = null; // 현재 열린 오버레이 저장

    var geoRetry = 0; // 위치 재시도 횟수

    findMyLocation();

    // [기능 1] 내 위치 찾기 (권한 요청 없이 IP 기반 위치 사용)
    function findMyLocation() {
        document.getElementById('current_addr').innerHTML = ' 위치를 찾는 중입니다...';

        // 1단계: Geolocation API 시도 (권한이 있으면 정확한 위치 사용)
        if (navigator.geolocation) {
            var primaryOptions = {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 5000
            };

            function onSuccess(position) {
                geoRetry = 0;
                myCurrentLat = position.coords.latitude;
                myCurrentLng = position.coords.longitude;
                updateMapWithLocation(myCurrentLat, myCurrentLng, true);
            }

            function onError(err) {
                // Geolocation 실패 시 IP 기반 위치로 폴백
                getLocationFromIP();
            }

            navigator.geolocation.getCurrentPosition(onSuccess, onError, primaryOptions);
        } else {
            // Geolocation 미지원 시 IP 기반 위치 사용
            getLocationFromIP();
        }
    }

    // IP 기반 위치 정보 조회 (무료 서비스 사용)
    function getLocationFromIP() {
        fetch('https://ipapi.co/json/')
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.latitude && data.longitude) {
                    myCurrentLat = data.latitude;
                    myCurrentLng = data.longitude;
                    updateMapWithLocation(myCurrentLat, myCurrentLng, false);
                } else {
                    fallbackLocation();
                }
            })
            .catch(function(error) {
                console.log('IP 위치 조회 실패:', error);
                fallbackLocation();
            });
    }

    // 기본값(서울 중심)으로 설정
    function fallbackLocation() {
        myCurrentLat = 37.566826;
        myCurrentLng = 126.9786567;
        updateMapWithLocation(myCurrentLat, myCurrentLng, false);
    }

    // 지도 업데이트 및 주소 표시
    function updateMapWithLocation(lat, lng, isPrecise) {
        var locPosition = new kakao.maps.LatLng(lat, lng);
        map.panTo(locPosition);

        if (myLocationMarker) myLocationMarker.setMap(null);
        
        var content = '<div class="my-location-marker">' +
                      '    <div class="marker-pulse"></div>' +
                      '    <div class="marker-dot"></div>' +
                      '</div>';

        myLocationMarker = new kakao.maps.CustomOverlay({
            map: map,
            position: locPosition,
            content: content,
            yAnchor: 0.5,
            zIndex: 3
        });

        searchDetailAddrFromCoords(locPosition, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                var detailAddr = !!result[0].road_address ? result[0].road_address.address_name : result[0].address.address_name;
                var locationType = isPrecise ? '(정확한 위치)' : '(근처 위치)';
                document.getElementById('current_addr').innerHTML = ' 현재 내 위치: ' + detailAddr + ' ' + locationType;
            } else {
                document.getElementById('current_addr').innerHTML = ' 현재 내 위치: ' + lat.toFixed(4) + ', ' + lng.toFixed(4);
            }
        });
    }

    function searchDetailAddrFromCoords(coords, callback) {
        geocoder.coord2Address(coords.getLng(), coords.getLat(), callback);
    }

    // [기능 2] 구/동 선택
    function updateDongList() {
        var selectedGu = guSelect.value;
        console.log('선택한 구:', selectedGu); // 디버깅
        
        dongSelect.innerHTML = '<option value="">2. 동 선택</option>';
        
        if (!selectedGu || selectedGu === '') { 
            dongSelect.disabled = true;
            console.log('구가 선택되지 않음, 동 선택 비활성화');
            return; 
        }
        
        // 선택한 구의 동 목록 확인
        var dongList = seoulArea[selectedGu];
        console.log('동 목록:', dongList); // 디버깅
        
        if (!dongList || dongList.length === 0) {
            console.log('동 목록이 없습니다');
            dongSelect.disabled = true;
            return;
        }
        
        // 선택한 구의 동 목록 추가
        dongList.forEach(function(dong) {
            var option = document.createElement('option');
            option.value = dong;
            option.text = dong;
            dongSelect.appendChild(option);
        });
        
        dongSelect.disabled = false;
        console.log('동 선택 활성화됨, 총 ' + dongList.length + '개 동');
        
        // 선택한 구로 지도 이동
        geocoder.addressSearch('서울 ' + selectedGu, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                map.setLevel(6);
                map.panTo(new kakao.maps.LatLng(result[0].y, result[0].x));
            }
        });
    }

    function changeDong() {
        var selectedGu = guSelect.value;
        var selectedDong = dongSelect.value;
        if (!selectedDong) return;
        geocoder.addressSearch('서울 ' + selectedGu + ' ' + selectedDong, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                map.setLevel(4); map.panTo(new kakao.maps.LatLng(result[0].y, result[0].x));
            }
        });
    }

    // [기능 3] 검색
    function enterSearch(e) { if(e.keyCode === 13) searchPlace(); }
    function searchPlace() {
        var keyword = document.getElementById('keyword').value;
        if (!keyword.trim()) { alert('검색어를 입력해주세요!'); return; }
        var selectedGu = guSelect.value;
        var selectedDong = dongSelect.value;
        var query = keyword;
        if (selectedGu && !keyword.includes("서울")) {
            query = "서울 " + selectedGu + " " + (selectedDong ? selectedDong + " " : "") + keyword;
        }
        ps.keywordSearch(query, placesSearchCB); 
    }
    function searchCategory(category) {
        var center = map.getCenter();
        ps.keywordSearch(category, placesSearchCB, {
            location: center, radius: 2000, sort: kakao.maps.services.SortBy.DISTANCE
        });
    }

    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            var bounds = new kakao.maps.LatLngBounds();
            removeMarker();
            if (overlay) { overlay.setMap(null); } // 기존 말풍선 닫기
            
            for (var i=0; i<data.length; i++) {
                displayMarker(data[i]);
                bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
            }
            map.setBounds(bounds);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) { alert('검색 결과가 없습니다.'); } 
        else if (status === kakao.maps.services.Status.ERROR) { alert('오류가 발생했습니다.'); }
    }

    // [기능 4] ★ 마커 표시 및 '진짜 길찾기' 연결 ★
    function displayMarker(place) {
        var marker = new kakao.maps.Marker({ map: map, position: new kakao.maps.LatLng(place.y, place.x) });
        
        kakao.maps.event.addListener(marker, 'click', function() {
            if (overlay) { overlay.setMap(null); } // 기존 것 닫기

            // 내 위치 좌표가 없으면(아직 못찾았으면) 그냥 목적지만 띄움
            var fromQuery = "";
            if (myCurrentLat && myCurrentLng) {
                fromQuery = `from/내위치,${myCurrentLat},${myCurrentLng}/`;
            }
            
            // ★ 카카오맵 길찾기 URL 생성 (내위치 -> 목적지)
            var toQuery = `to/${place.place_name},${place.y},${place.x}`;
            var routeUrl = `https://map.kakao.com/link/${fromQuery}${toQuery}`;

            // 오버레이(말풍선) 내용 생성
            var content = `
                <div class="custom-overlay">
                    <span class="close-btn" onclick="closeOverlay()">×</span>
                    <span class="place-name">${place.place_name}</span>
                    <div style="font-size:12px; color:#888; margin-bottom:8px;">${place.address_name}</div>
                    <div class="btn-group">
                        <a href="${routeUrl}" target="_blank" class="btn-route btn-car">🚗 자차</a>
                        <a href="${routeUrl}" target="_blank" class="btn-route btn-transit">🚌 대중교통</a>
                        <a href="${routeUrl}" target="_blank" class="btn-route btn-walk">🚶 도보</a>
                    </div>
                </div>`;

            // 커스텀 오버레이로 말풍선 띄우기
            overlay = new kakao.maps.CustomOverlay({
                content: content,
                map: map,
                position: marker.getPosition(),
                zIndex: 10
            });
        });
        markers.push(marker);
    }

    // 말풍선 닫기 함수 (전역으로 노출)
    window.closeOverlay = function() {
        if (overlay) overlay.setMap(null);
    }

    function removeMarker() {
        for (var i = 0; i < markers.length; i++) markers[i].setMap(null);
        markers = [];
    }
    });
</script>
{% endblock %}
