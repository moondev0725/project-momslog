기능: 공지사항 목록 표시, 관리자 글쓰기
-->
{% extends 'base.html' %}
{% block content %}
<style>
    * {
        box-sizing: border-box;
    }
    
    img {
        max-width: 100%;
        height: auto;
    }
    
    .notice-container {
        max-width: 900px;
        margin: 50px auto;
        padding: 20px;
        width: 100%;
    }
    
    .notice-table {
        width: 100%;
        border-collapse: collapse;
        border-top: 2px solid #333;
    }
    
    .notice-table thead tr {
        background: #f8f9fa;
        border-bottom: 1px solid #ddd;
    }
    
    .notice-table th {
        padding: 15px;
    }
    
    .notice-table tbody tr {
        border-bottom: 1px solid #eee;
    }
    
    .notice-table td {
        padding: 15px;
    }
    
    @media (max-width: 768px) {
        .notice-container {
            margin: 20px auto;
            padding: 15px;
        }
        
        .notice-table thead {
            display: none;
        }
        
        .notice-table tbody tr {
            display: block;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background: #fff;
        }
        
        .notice-table tbody td {
            display: block;
            padding: 5px 0;
            border: none;
            text-align: left !important;
        }
        
        .notice-table tbody td:before {
            content: attr(data-label);
            font-weight: 600;
            margin-right: 10px;
            color: #666;
        }
        
        .notice-table tbody td:nth-child(1) {
            display: none;
        }
        
        .notice-table tbody td:nth-child(2) {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .notice-table tbody td:nth-child(2):before {
            display: none;
        }
    }
</style>
<div class="notice-container">
    <h2 style="text-align: center; margin-bottom: 30px; font-weight: 800;">
    <a href="{% url 'board:notice_list' %}" style="text-decoration: none; color: #333;">
        공지사항
    </a>
    </h2>
    
    <table class="notice-table">
        <thead>
            <tr>
                <th style="width: 10%;">번호</th>
                <th style="text-align: left;">제목</th>
                <th style="width: 20%;">날짜</th>
                <th style="width: 10%;">조회</th>
            </tr>
        </thead>
        <tbody>
            {% for notice in notices %}
            <tr>
                <td style="text-align: center;">{{ forloop.revcounter }}</td>
                <td>
                    <a href="{% url 'board:notice_detail' notice.pk %}" style="text-decoration: none; color: #333; font-weight: 500;">
                        {{ notice.title }}
                    </a>
                </td>
                <td style="text-align: center; color: #666;" data-label="날짜">{{ notice.created_at|date:"Y-m-d" }}</td>
                <td style="text-align: center; color: #666;" data-label="조회">{{ notice.view_count }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4" style="text-align:center; padding:30px;">등록된 공지사항이 없습니다.</td></tr>
            {% endfor %}
        </tbody>
    </table> <div style="text-align: right; margin-top: 20px;">
        {% if user.is_staff %}
            <a href="{% url 'board:notice_write' %}" 
               style="display: inline-block; padding: 10px 20px; background: #ff6b6b; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
                글쓰기
            </a>
        {% endif %}
    </div>

</div>
{% endblock %}
