{% extends 'base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/multi-upload.css' %}">
<script src="{% static 'js/multi-upload.js' %}"></script>
{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 50px auto; padding: 20px;">
    <h2>글쓰기 (다중 이미지 업로드 예시)</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" name="title" id="title" required>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea name="content" id="content" required></textarea>
        </div>

        <!-- 다중 이미지 업로드 영역 -->
        <div class="form-group">
            <label>
                이미지 업로드 
                <span class="file-count" id="fileCount">0/10</span>
            </label>
            
            <!-- 숨겨진 파일 입력 -->
            <input type="file" 
                   id="imageInput" 
                   name="images" 
                   multiple 
                   accept="image/jpeg,image/png,image/gif,image/webp"
                   style="display: none;">
            
            <!-- 드래그 앤 드롭 영역 -->
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <div class="upload-area-content">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">이미지를 선택하거나 드래그해주세요</div>
                    <div class="upload-hint">최대 10개, 각 5MB 이하 (JPG, PNG, GIF, WebP)</div>
                </div>
            </div>

            <!-- 미리보기 영역 -->
            <div id="imagePreview"></div>
        </div>

        <button type="submit" class="btn-submit">등록하기</button>
    </form>
</div>

<style>
    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }

    .form-group input[type="text"],
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #ff6b6b;
        box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
    }

    .form-group textarea {
        min-height: 150px;
        resize: vertical;
    }

    .btn-submit {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ff9a9e 0%, #ff6b6b 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
    }

    .btn-submit:active {
        transform: translateY(0);
    }

    /* 다크모드 */
    .dark-mode .form-group label {
        color: var(--text-primary);
    }

    .dark-mode .form-group input,
    .dark-mode .form-group textarea {
        background: var(--bg-tertiary);
        color: var(--text-primary);
        border-color: var(--border-color);
    }

    .dark-mode .form-group input:focus,
    .dark-mode .form-group textarea:focus {
        background: var(--bg-secondary);
        border-color: var(--accent);
    }
</style>

<script>
    // 폼 제출 시 파일 데이터 처리
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        
        // 기존 파일 입력 제거
        formData.delete('images');
        
        // MultiImageUpload에서 파일 가져오기
        if (typeof multiUpload !== 'undefined') {
            const files = multiUpload.getFiles();
            files.forEach((file, index) => {
                formData.append('images', file);
            });
        }
        
        // 실제 제출 (AJAX 또는 일반 제출)
        // fetch를 사용한 AJAX 제출 예시:
        /*
        fetch(this.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(response => response.json())
        .then(data => {
            console.log('Success:', data);
            window.location.href = data.redirect_url;
        })
        .catch(error => {
            console.error('Error:', error);
        });
        */
        
        // 일반 제출 (페이지 리로드)
        this.submit();
    });
</script>
{% endblock %}
