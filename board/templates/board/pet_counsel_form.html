{% extends "base.html" %}
{% block content %}
<style>
.form-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}
.form-container h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
}
.form-container input,
.form-container textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 15px;
    font-size: 14px;
}
.form-container textarea {
    min-height: 200px;
    resize: none;
}
.form-actions {
    display: flex;
    gap: 10px;
}
.btn {
    min-width: 90px;
    height: 42px;
    border-radius: 6px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}
.btn-primary {
    background: #ff6b6b;
    color: #fff;
}
.btn-secondary {
    background: #6c757d;
    color: #fff;
}
</style>

<div class="form-container">
    <h2>
        {% if is_edit %}
            🐾 반려동물 고민상담 수정
        {% else %}
            🐾 반려동물 고민상담 작성
        {% endif %}
    </h2>

    <form method="post">
        {% csrf_token %}
        <input
            type="text"
            name="title"
            placeholder="제목"
            value="{{ post.title|default:'' }}"
            required
        >
        <textarea
            name="content"
            placeholder="고민 내용을 입력해주세요"
            required
        >{{ post.content|default:'' }}</textarea>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {% if is_edit %}수정 완료{% else %}작성{% endif %}
            </button>
            <a href="{% url 'board:pet_counsel_list' %}" class="btn btn-secondary">
                취소
            </a>
        </div>
    </form>
</div>
{% endblock %}
