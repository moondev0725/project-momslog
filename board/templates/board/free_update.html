{% extends "base.html" %}
{% load static %}

{% block content %}
<style>

.board-write-card{
  padding: 30px;
}

/* 타이틀 */
.write-title-wrap{ margin-bottom: 18px; }
.write-title{ font-size: 22px; font-weight: 800; margin:0; }
.write-title-line{ height:2px; background:#ff6b6b; margin-top:10px; }

/* 필드 공통 */
.write-field{ margin-top: 18px; }
.write-label{ display:block; font-weight:700; margin-bottom:10px; }
.write-help{ margin-top:8px; color:#888; font-size:12px; }

/* 인풋/셀렉트/텍스트 */
.write-input, .write-select, .write-textarea, .write-file{
  width:100%;
  border:1px solid #e5e5e5;
  border-radius:10px;
  padding:12px 14px;
  background:#fff;
  outline:none;
}

.write-textarea{ resize:none; min-height: 280px; }

/* 파일줄 */
.file-row{ display:flex; align-items:center; gap:14px; }
.file-help{ font-size:12px; color:#888; white-space:nowrap; }

/* 체크박스 */
.write-inline{ margin-top: 10px; }
.write-checkbox{ font-size:13px; color:#555; }

/* 버튼 */
.write-btn-row{
  display:flex;
  gap:10px;
  margin-top: 22px;
}

.btn-submit{
  background:#ff6b6b;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.btn-cancel{
  background:#6c757d;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  font-weight:700;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
}

</style>

<link rel="stylesheet" href="{% static 'css/board.css' %}">

<div class="board-wrapper">

  <div class="board-card board-write-card">

    <!-- 타이틀(글쓰기와 동일 위치/스타일) -->
    <div class="write-title-wrap">
      <h2 class="write-title">글수정</h2>
      <div class="write-title-line"></div>
    </div>

    <form method="post"
          action="{% url 'board:free_update' post.pk %}?category={{ request.GET.category|default:'all' }}&page={{ request.GET.page|default:1 }}&comment_page={{ request.GET.comment_page|default:1 }}"
          enctype="multipart/form-data"
          class="write-form">
      {% csrf_token %}

      <!-- 카테고리 -->
      <div class="write-field">
        <label class="write-label">카테고리</label>
        <select name="category" class="write-select" required>
          <option value="" disabled>-- 카테고리를 선택하세요 --</option>
          <option value="육아수다" {% if post.category == "육아수다" %}selected{% endif %}>육아수다</option>
          <option value="남편뒷담화" {% if post.category == "남편뒷담화" %}selected{% endif %}>남편뒷담화</option>
          <option value="시댁/친정" {% if post.category == "시댁/친정" %}selected{% endif %}>시댁/친정</option>
          <option value="임신출산" {% if post.category == "임신출산" %}selected{% endif %}>임신출산</option>
        </select>
        <p class="write-help">게시글의 주제에 맞는 카테고리를 선택해주세요.</p>
      </div>

      <!-- 익명 체크(글쓰기 페이지에 있던 거 그대로 두고 싶으면 유지) -->
      <div class="write-field write-inline">
        <label class="write-checkbox">
          <input type="checkbox" name="is_anonymous" {% if post.is_anonymous %}checked{% endif %}>
          익명으로 작성 (작성자 이름이 표시되지 않습니다)
        </label>
      </div>

      <!-- 제목 -->
      <div class="write-field">
        <label class="write-label">제목</label>
        <input type="text" name="title" class="write-input"
               placeholder="제목을 입력하세요"
               value="{{ post.title }}" required>
        <p class="write-help">눈에 띄고 내용을 잘 표현하는 제목을 지어주세요.</p>
      </div>

      <!-- 내용 -->
      <div class="write-field">
        <label class="write-label">내용</label>
        <textarea name="content" rows="14" class="write-textarea"
                  placeholder="내용을 자유롭게 작성해주세요..." required>{{ post.content }}</textarea>
        <p class="write-help">감정을 솔직하게 표현해주세요. 다른 엄마들과의 공감대를 형성할 수 있습니다.</p>
      </div>

      <!-- 첨부파일 -->
      <div class="write-field">
        <label class="write-label">첨부파일 (최대 5개)</label>
        <div class="file-row">
          <input type="file" name="files" multiple class="write-file">
          <span class="file-help">파일은 최대 5개까지 선택할 수 있어요.</span>
        </div>
      </div>

      <!-- 버튼(글쓰기처럼 좌측 정렬 + 동일 컬러) -->
      <div class="write-btn-row">
        <button type="submit" class="btn-submit">수정완료</button>
        <a href="{% url 'board:free_detail' post.pk %}?category={{ request.GET.category|default:'all' }}&page={{ request.GET.page|default:1 }}"
           class="btn-cancel">취소</a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
